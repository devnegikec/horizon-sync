server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Remote App (inventory) - served from a subdirectory
    # Using ^~ to take priority over regex locations
    location ^~ /inventory/ {
        alias /usr/share/nginx/html/inventory/;
        try_files $uri $uri/ /inventory/index.html;

        # Static caching for inventory assets
        location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Host App (platform)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static caching for platform assets
    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
