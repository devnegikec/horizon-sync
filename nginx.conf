server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Never cache HTML files and remoteEntry.js (critical for deployments)
    location ~* (?:remoteEntry\.js|\.html)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Remote App (inventory) - served from a subdirectory
    # Using ^~ to take priority over regex locations
    location ^~ /inventory/ {
        alias /usr/share/nginx/html/inventory/;
        try_files $uri $uri/ /inventory/index.html;

        # Never cache inventory remoteEntry.js
        location = /inventory/remoteEntry.js {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # Static caching for inventory hashed assets
        location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Host App (platform)
    location / {
        try_files $uri $uri/ /index.html;

        # No cache for index.html (SPA entry point)
        location = / {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    # Static caching for platform hashed assets
    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
